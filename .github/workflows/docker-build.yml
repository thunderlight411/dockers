name: Build Containers

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  discover:
    runs-on: ubuntu-latest

    outputs:
      containers: ${{ steps.set.outputs.containers }}

    steps:

      - uses: actions/checkout@v4

      - id: set
        run: |
          containers=$(ls containers | jq -R -s -c 'split("\n")[:-1]')
          echo "containers=$containers" >> $GITHUB_OUTPUT

  build:

    needs: discover

    runs-on: ubuntu-latest

    strategy:
      matrix:
        container: ${{ fromJson(needs.discover.outputs.containers) }}

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./containers/${{ matrix.container }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest
