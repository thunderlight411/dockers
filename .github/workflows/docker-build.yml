name: Build Containers

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        container:
          - template
          - nginx

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest \
            ./containers/${{ matrix.container }}

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest
