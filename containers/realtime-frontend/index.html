<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Earth Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body {
    margin: 0;
  }

  #map {
    height: 100vh;
    width: 100%;
  }

  #controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    padding: 10px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    z-index: 1000;
  }

  #controls input {
    margin-right: 5px;
  }
</style>
</head>

<body>
  <div id="controls">
    <label><input type="checkbox" id="toggleFlights" checked> Flights</label><br>
    <label><input type="checkbox" id="toggleQuakes" checked> Earthquakes</label><br>
    <label><input type="checkbox" id="toggleLightning" checked> Lightning</label>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
